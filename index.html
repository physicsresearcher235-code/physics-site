<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مثلث الجهد والكثافة الاحتمالية</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0f172a, #2563eb);
    color: white;
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 35px;
}

select {
    padding: 10px;
    font-size: 18px;
    width: 200px;
}

img {
    margin-top: 30px;
    width: 400px;
    border-radius: 10px;
    box-shadow: 0 0 15px black;
}
</style>

</head>

<body>

<h1>مثلث الجهد والكثافة الاحتمالية</h1>
<p>اختاري زاوية رأس المثلث:</p>

<select onchange="showImage()" id="angleSelect">
    <option value="">-- اختاري زاوية --</option>
    <option value="30">30°</option>
    <option value="60">60°</option>
    <option value="90">90°</option>
    <option value="110">110°</option>
</select>

<br>

<img id="resultImage" src="" style="display:none;">

<script>
function showImage() {
    let angle = document.getElementById("angleSelect").value;
    let img = document.getElementById("resultImage");

    if (angle !== "") {
        img.src = "images/angle_" + angle + ".png";
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }
}
</script>

</body>
</html>
