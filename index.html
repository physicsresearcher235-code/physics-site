<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مثلث الجهد والكثافة الاحتمالية</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f172a, #2563eb);
      color: white;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
    }

    h1 {
      font-size: 38px;
      margin-bottom: 15px;
    }

    p {
      font-size: 20px;
      margin-bottom: 20px;
    }

    select {
      padding: 10px;
      font-size: 18px;
      width: 220px;
      border-radius: 8px;
      border: none;
    }

    .image-container {
      margin-top: 30px;
    }

    img {
      max-width: 90%;
      width: 700px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.35);
      background: white;
      display: none;
    }
  </style>
</head>
<body>

  <h1>مثلث الجهد والكثافة الاحتمالية</h1>
  <p>اختاري زاوية رأس المثلث:</p>

  <select id="angleSelect" onchange="showImage()">
    <option value="">-- اختاري زاوية --</option>
    <option value="30">30°</option>
    <option value="60">60°</option>
    <option value="90">90°</option>
    <option value="110">110°</option>
  </select>

  <div class="image-container">
    <img id="resultImage" alt="صورة الكثافة الاحتمالية داخل المثلث">
  </div>

  <script>
    function showImage() {
      const angle = document.getElementById("angleSelect").value;
      const img = document.getElementById("resultImage");

      if (angle !== "") {
        img.src = "angle_" + angle + ".png";
        img.style.display = "block";
      } else {
        img.style.display = "none";
        img.removeAttribute("src");
      }
    }
  </script>

</body>
</html>
