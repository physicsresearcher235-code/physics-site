<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>قسم الفيزياء</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Tahoma;
      background: linear-gradient(to right, #020617, #1e3a8a);
      color: white;
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    .logo {
      width: 90px;
      background: white;
      border-radius: 10px;
      padding: 5px;
    }

    .title-box {
      flex: 1;
    }

    .main-title {
      font-size: 32px;
      font-weight: bold;
    }

    .welcome {
      font-size: 22px;
      margin-top: 5px;
      color: #e5e7eb;
    }

    .subtitle {
      font-size: 18px;
      margin-top: 10px;
      color: #cbd5e1;
    }

    .content-box {
      width: 85%;
      max-width: 900px;
      margin: 30px auto;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(8px);
    }

    select {
      padding: 10px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      margin-top: 15px;
    }

    .result-image {
      margin-top: 25px;
      max-width: 100%;
      border-radius: 15px;
      background: white;
      padding: 10px;
    }

    .footer {
      margin-top: 20px;
      font-size: 16px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

  <!-- الشعارات -->
  <div class="top-bar">
    <img src="faculty-logo.png" class="logo">

    <div class="title-box">
      <div class="main-title">قسم الفيزياء - كلية العلوم</div>
      <div class="welcome">مرحبًا بكم في قسم الفيزياء</div>
      <div class="subtitle">منصة تفاعلية لعرض نتائج بئر الجهد المثلثي</div>
    </div>

    <img src="university-logo.png" class="logo">
  </div>

  <!-- المحتوى -->
  <div class="content-box">
    <h2>اختاري زاوية رأس المثلث</h2>

    <select id="angleSelect">
      <option value="30">30°</option>
      <option value="60">60°</option>
      <option value="90" selected>90°</option>
      <option value="110">110°</option>
    </select>

    <br>

    <img id="resultImage" src="angle_90.png" class="result-image">

    <div class="footer">
      إعداد الطالبة: رغد البهلول
    </div>
  </div>

  <script>
    const select = document.getElementById("angleSelect");
    const image = document.getElementById("resultImage");

    select.addEventListener("change", function () {
      const angle = select.value;
      image.src = "angle_" + angle + ".png";
    });
  </script>

</body>
</html>
