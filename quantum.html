<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الفيزياء | ميكانيكا الكم</title>
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
    <main class="page-shell">
        <header class="site-header site-header--welcome">
            <div class="brand-lockup">
                <img class="logo-badge logo-badge--hero logo-badge--faculty" src="./images/faculty-logo-clean.png" alt="شعار الكلية">
                <div class="brand-copy">
                    <h2>ميكانيكا الكم</h2>
                </div>
                <img class="logo-badge logo-badge--hero logo-badge--university" src="./images/university-logo-clean.png" alt="شعار الجامعة">
            </div>
            <nav class="top-nav" aria-label="روابط الصفحات">
                <a href="./index.html">الرئيسية</a>
                <a href="./classical.html">الميكانيكا الكلاسيكية</a>
                <a href="./electricity.html">الكهربائية</a>
                <a href="./quantum.html" aria-current="page">ميكانيكا الكم</a>
                <a href="./triangular.html">البئر المثلثي</a>
            </nav>
        </header>

        <section class="content-grid">
            <article class="card">
                <div class="card-title">
                    <div>
                        <h3>البئر اللانهائي أحادي البعد</h3>
                    </div>
                    <div class="badge">ψₙ(x) = √(2/L) sin(nπx/L)</div>
                </div>

                <div class="control-grid">
                    <div class="control-group">
                        <label for="wellWidth">عرض البئر L</label>
                        <input type="range" id="wellWidth" min="1" max="10" step="0.1" value="5">
                        <div class="value-display" id="widthVal">5.0 nm</div>
                    </div>

                    <div class="control-group">
                        <label for="quantumN">العدد الكمي n</label>
                        <input type="range" id="quantumN" min="1" max="5" step="1" value="1">
                        <div class="value-display" id="nVal">1</div>
                    </div>

                    <div class="control-group">
                        <div class="value-display">E ∝ <span id="energyVal" style="margin-inline-start: 8px;">0.000</span></div>
                    </div>
                </div>

                <div class="canvas-grid">
                    <canvas id="wave1D" width="720" height="320"></canvas>
                    <canvas id="prob1D" width="720" height="320"></canvas>
                </div>
            </article>
        </section>
    </main>

    <script src="./assets/quantum.js"></script>
</body>
</html>
